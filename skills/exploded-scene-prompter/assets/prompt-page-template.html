<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
    <style>
      :root {
        --bg: #f5f1e8;
        --panel: rgba(255, 255, 255, 0.82);
        --text: #1d1a16;
        --muted: #6d6359;
        --accent: #be6a38;
        --border: rgba(29, 26, 22, 0.08);
        --shadow: 0 20px 60px rgba(42, 34, 24, 0.12);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
        background:
          radial-gradient(circle at top left, rgba(190, 106, 56, 0.12), transparent 32%),
          linear-gradient(180deg, #f8f3eb 0%, var(--bg) 100%);
        color: var(--text);
      }

      .shell {
        width: min(1100px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 48px 0 72px;
      }

      .hero {
        margin-bottom: 28px;
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      h1, h2 {
        margin: 0 0 12px;
        font-weight: 600;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
      }

      .card {
        padding: 24px;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.78);
        box-shadow: var(--shadow);
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 10px;
        color: var(--accent);
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        line-height: 1.6;
        font-family: "SFMono-Regular", ui-monospace, Menlo, monospace;
        font-size: 13px;
        color: #2a241d;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <span class="eyebrow">Prompt Package</span>
        <h1>{{title}}</h1>
        <p>{{scene_summary}}</p>
      </section>

      <section class="grid">
        <article class="card">
          <span class="eyebrow">Prompt A</span>
          <h2>Assembled Shot</h2>
          <pre>{{assembled_shot}}</pre>
        </article>

        <article class="card">
          <span class="eyebrow">Prompt B</span>
          <h2>Exploded Shot</h2>
          <pre>{{exploded_shot}}</pre>
        </article>

        <article class="card">
          <span class="eyebrow">Prompt C</span>
          <h2>Detail / Alt Angle</h2>
          <pre>{{detail_shot}}</pre>
        </article>

        <article class="card">
          <span class="eyebrow">Notes</span>
          <h2>Art Direction</h2>
          <pre>{{art_direction}}</pre>
        </article>
      </section>
    </main>
  </body>
</html>
